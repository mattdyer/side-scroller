<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Zombie Side-Scroller</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            border: 4px solid #000;
            image-rendering: pixelated;
            background-color: #87CEEB; /* Sky blue */
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            text-shadow: 2px 2px #000;
            pointer-events: none;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            pointer-events: none;
        }
        button {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #f00;
            color: #fff;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="ui">Score: <span id="score">0</span></div>
    <div id="controls">Arrows to Move | Space to Jump | F to Fullscreen</div>
    <button id="startBtn" style="position: absolute; top: 70px; left: 20px; padding: 10px; background: #0f0; color: #000; font-weight: bold; cursor: pointer;">Start Game</button>
    <button id="fullscreenBtn">Fullscreen</button>
    <canvas id="gameCanvas"></canvas>

    <script type="module" src="game.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                canvas.requestFullscreen().catch(err => {
                    alert(`Error attempting to enable full-screen mode: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        });
 
        const startBtn = document.getElementById('startBtn');
        startBtn.addEventListener('click', async () => {
            await window.game.startGame('assets/levels/level1.json');
            startBtn.style.display = 'none';
        });

        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'f') {
                if (!document.fullscreenElement) {
                    canvas.requestFullscreen().catch(err => {
                        alert(`Error attempting to enable full-screen mode: ${err.message}`);
                    });
                } else {
                    document.exitFullscreen();
                }
            }
        });
    </script>
</body>
</html>
